name: Lighthouse CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: false  # Enforce performance budgets

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Check bundle size budget
        run: |
          MAX_JS_KB=350
          JS_SIZE=$(find dist -name "*.js" -exec cat {} + | wc -c)
          JS_KB=$((JS_SIZE / 1024))
          echo "Total JS bundle size: ${JS_KB}KB"
          if [ "$JS_KB" -gt "$MAX_JS_KB" ]; then
            echo "::error::JS bundle size (${JS_KB}KB) exceeds budget (${MAX_JS_KB}KB)"
            exit 1
          fi
          echo "✅ JS bundle size (${JS_KB}KB) is within budget (${MAX_JS_KB}KB)"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse CI
        run: |
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Generate Lighthouse Report Summary
        if: always()
        run: |
          echo "## Lighthouse Report" >> $GITHUB_STEP_SUMMARY

          # Check if results exist
          if [ -d ".lighthouseci" ]; then
            # Get the latest manifest
            MANIFEST=$(ls -t .lighthouseci/lhr-*.json 2>/dev/null | head -1)

            if [ -n "$MANIFEST" ]; then
              # Extract scores using jq
              PERF=$(jq '.categories.performance.score * 100 | floor' "$MANIFEST")
              A11Y=$(jq '.categories.accessibility.score * 100 | floor' "$MANIFEST")
              BP=$(jq '.categories["best-practices"].score * 100 | floor' "$MANIFEST")
              SEO=$(jq '.categories.seo.score * 100 | floor' "$MANIFEST")

              echo "| Category | Score |" >> $GITHUB_STEP_SUMMARY
              echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| 🚀 Performance | ${PERF}% |" >> $GITHUB_STEP_SUMMARY
              echo "| ♿ Accessibility | ${A11Y}% |" >> $GITHUB_STEP_SUMMARY
              echo "| ✅ Best Practices | ${BP}% |" >> $GITHUB_STEP_SUMMARY
              echo "| 🔍 SEO | ${SEO}% |" >> $GITHUB_STEP_SUMMARY

              # Warn if any score is below threshold
              if [ "$PERF" -lt 80 ]; then
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "⚠️ Performance score is below 80%. Consider optimizing." >> $GITHUB_STEP_SUMMARY
              fi

              if [ "$A11Y" -lt 90 ]; then
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "⚠️ Accessibility score is below 90%. Please review." >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "No Lighthouse results found." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "Lighthouse CI directory not found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30
