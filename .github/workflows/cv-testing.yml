name: Computer Vision Testing

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cv-strategy-comparison:
    name: CV Strategy Comparison
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        strategy: [current, optimized, fast, accurate, balanced]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install canvas system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CV tests for ${{ matrix.strategy }} strategy
        run: npm run test:cv:offline -- --strategies ${{ matrix.strategy }} --output test-results/cv-${{ matrix.strategy }}

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: cv-results-${{ matrix.strategy }}
          path: test-results/cv-${{ matrix.strategy }}/

  cv-full-comparison:
    name: Full Strategy Comparison
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: cv-strategy-comparison

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install canvas system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run all strategies comparison
        run: npm run test:cv:ci

      - name: Upload comparison report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: cv-comparison-report
          path: test-results/cv/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install canvas system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Upload coverage
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        if: always()
        with:
          file: ./coverage/coverage-final.json
          fail_ci_if_error: false

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: cv-full-comparison

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20

      - name: Download CV results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: cv-comparison-report
          path: test-results/cv/

      - name: Check performance regressions
        run: |
          echo "Checking for performance regressions..."
          if [ -f test-results/cv/cv-test-results.json ]; then
            node -e "
              const fs = require('fs');
              const results = JSON.parse(fs.readFileSync('test-results/cv/cv-test-results.json', 'utf8'));

              const optimized = results.find(r => r.strategy === 'optimized');

              if (optimized) {
                const f1Score = optimized.metrics.f1Score;
                const time = optimized.metrics.totalTime;

                console.log('Optimized Strategy:');
                console.log('  F1 Score:', (f1Score * 100).toFixed(1) + '%');
                console.log('  Time:', time.toFixed(0) + 'ms');

                if (f1Score < 0.85) {
                  console.error('FAIL: F1 score below target (85%)');
                  process.exit(1);
                }

                if (time > 5000) {
                  console.error('FAIL: Detection time exceeds target (5000ms)');
                  process.exit(1);
                }

                console.log('PASS: Performance targets met');
              } else {
                console.warn('WARNING: No optimized strategy results found');
              }
            "
          else
            echo "WARNING: No results file found"
          fi

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build production bundle
        run: npm run build

      - name: Check bundle size
        run: |
          echo "Checking bundle size..."
          BUNDLE_SIZE=$(du -sk dist | cut -f1)
          echo "Bundle size: ${BUNDLE_SIZE}KB"

          if [ $BUNDLE_SIZE -gt 5120 ]; then
            echo "WARNING: Bundle size exceeds 5MB"
          else
            echo "Bundle size OK"
          fi
