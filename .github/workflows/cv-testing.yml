name: Computer Vision Testing

on:
  # Disabled on PRs - CV tests are slow and run separately
  # push:
  #   branches: [ main, develop, claude/** ]
  # pull_request:
  #   branches: [ main, develop ]
  workflow_dispatch:  # Manual trigger only for now

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cv-strategy-comparison:
    name: CV Strategy Comparison
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        strategy: [current, optimized, fast, accurate, balanced]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install canvas system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run CV tests for ${{ matrix.strategy }} strategy
        run: bun run tests/offline-cv-runner.ts --strategies ${{ matrix.strategy }} --output test-results/cv-${{ matrix.strategy }}

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: cv-results-${{ matrix.strategy }}
          path: test-results/cv-${{ matrix.strategy }}/

  cv-full-comparison:
    name: Full Strategy Comparison
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: cv-strategy-comparison

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install canvas system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run all strategies comparison
        run: bun run test:cv:ci

      - name: Upload comparison report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: cv-comparison-report
          path: test-results/cv/

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'test-results/cv/cv-test-report.md';

            if (fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf8');

              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🔍 Computer Vision Test Results\n\n${report}`
              });
            }

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install canvas system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun run test:unit

      - name: Upload coverage
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        if: always()
        with:
          file: ./coverage/coverage-final.json
          fail_ci_if_error: false

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: cv-full-comparison

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Download CV results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: cv-comparison-report
          path: test-results/cv/

      - name: Check performance regressions
        run: |
          echo "Checking for performance regressions..."
          if [ -f test-results/cv/cv-test-results.json ]; then
            node -e "
              const fs = require('fs');
              const results = JSON.parse(fs.readFileSync('test-results/cv/cv-test-results.json', 'utf8'));

              // Check if optimized strategy meets targets
              const optimized = results.find(r => r.strategy === 'optimized');

              if (optimized) {
                const f1Score = optimized.metrics.f1Score;
                const time = optimized.metrics.totalTime;

                console.log('Optimized Strategy:');
                console.log('  F1 Score:', (f1Score * 100).toFixed(1) + '%');
                console.log('  Time:', time.toFixed(0) + 'ms');

                // Targets: F1 > 0.85, Time < 5000ms
                if (f1Score < 0.85) {
                  console.error('❌ FAIL: F1 score below target (85%)');
                  process.exit(1);
                }

                if (time > 5000) {
                  console.error('❌ FAIL: Detection time exceeds target (5000ms)');
                  process.exit(1);
                }

                console.log('✅ PASS: Performance targets met');
              } else {
                console.warn('⚠️ WARNING: No optimized strategy results found');
              }
            "
          else
            echo "⚠️ WARNING: No results file found"
          fi

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript type check
        run: bun run typecheck

      - name: Build production bundle
        run: bun run build

      - name: Check bundle size
        run: |
          echo "Checking bundle size..."
          BUNDLE_SIZE=$(du -sk dist | cut -f1)
          echo "Bundle size: ${BUNDLE_SIZE}KB"

          # Warn if bundle exceeds 5MB
          if [ $BUNDLE_SIZE -gt 5120 ]; then
            echo "⚠️ WARNING: Bundle size exceeds 5MB"
          else
            echo "✅ Bundle size OK"
          fi
