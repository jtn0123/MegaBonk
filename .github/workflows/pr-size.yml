name: PR Size

on:
  pull_request:

jobs:
  size:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: codelytv/pr-size-labeler@0b7f116f59d1830881bc1cc88be32b005ab09ffa # v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_max_size: 10
          s_max_size: 100
          m_max_size: 500
          l_max_size: 1000
